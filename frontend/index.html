<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo/omni.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniPanel</title>
    <style>
      /* JS 加载前的即时占位，避免白屏 */
      html, body { margin: 0; height: 100%; background: #1a1717; }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1717;
        color: #fdfcfc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        z-index: 99999;
      }
      #boot-splash__title {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        background: linear-gradient(135deg, #fdfcfc 0%, #007aff 55%, #30d158 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.72; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <span id="boot-splash__title">OmniPanel</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
