name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          #   args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version to project files
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const v = process.env.VERSION;
          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = v;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
          let cargo = fs.readFileSync('Cargo.toml', 'utf8');
          cargo = cargo.replace(/^version = "[^"]+"/m, `version = "${v}"`);
          fs.writeFileSync('Cargo.toml', cargo);
          console.log(`Synced app version to ${v}`);
          EOF

      - name: Prepare Tauri signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          KEY_PASSWORD: ${{ secrets.UPDATER_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${RAW_KEY:-}" ]; then
            echo "::error::GitHub Secret UPDATER_PRIVATE_KEY 未配置。"
            echo "请执行: cd frontend && npm run tauri -- signer generate -w tauri-signing.key --ci -p \"\""
            echo "将 tauri-signing.key 文件全文（单行 base64）粘贴到 Secret。"
            exit 1
          fi
          KEY_FILE="${RUNNER_TEMP}/tauri-signing.key"
          trimmed="$(printf '%s' "$RAW_KEY" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if printf '%s' "$trimmed" | grep -q 'untrusted comment:'; then
            # 误粘贴了 minisign 明文，转回 Tauri 要求的 base64 单行格式
            printf '%s' "$RAW_KEY" | base64 -w0 > "$KEY_FILE"
            echo "已将 minisign 明文密钥转换为 base64"
          else
            # 标准：tauri-signing.key 本身就是单行 base64
            printf '%s' "$trimmed" > "$KEY_FILE"
          fi
          if ! decoded="$(base64 -d "$KEY_FILE" 2>/dev/null)" || [ -z "$decoded" ]; then
            echo "::error::UPDATER_PRIVATE_KEY 不是有效 base64。"
            echo "请直接粘贴 tauri-signing.key 文件全文，不要手动解码或添加空格/换行。"
            exit 1
          fi
          chmod 600 "$KEY_FILE"
          # bundle 会先按文件路径读取，再对文件内容做 base64 解码
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_FILE" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${KEY_PASSWORD:-}" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OmniPanel v${{ steps.version.outputs.version }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}