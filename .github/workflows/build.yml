name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version to project files
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const v = process.env.VERSION;
          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = v;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
          let cargo = fs.readFileSync('Cargo.toml', 'utf8');
          cargo = cargo.replace(/^version = "[^"]+"/m, `version = "${v}"`);
          fs.writeFileSync('Cargo.toml', cargo);
          console.log(`Synced app version to ${v}`);
          EOF

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION;
          const text = fs.readFileSync('CHANGELOG.md', 'utf8');
          const escaped = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp(
            `^## \\[${escaped}\\][^\\n]*\\n([\\s\\S]*?)(?=\\n---\\s*\\n|\\n## \\[|\\z)`,
            'm',
          );
          const match = text.match(re);
          if (!match) {
            console.error(`::error::CHANGELOG.md 中未找到 ## [${version}] 段落，请先补充后再打 tag。`);
            process.exit(1);
          }
          const body = match[1].trim();
          const delimiter = 'CHANGELOG_EOF';
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `body<<${delimiter}\n${body}\n${delimiter}\n`,
          );
          console.log(`已从 CHANGELOG.md 提取 v${version} 发布说明（${body.split('\n').length} 行）`);
          EOF

      - name: Prepare Tauri signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          KEY_PASSWORD: ${{ secrets.UPDATER_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/prepare-tauri-signing-key.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OmniPanel v${{ steps.version.outputs.version }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}