[workspace]
resolver = "2"
members = [
    "src-tauri",
    "crates/omnipanel-core",
    "crates/omnipanel-renderer",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Terminal
alacritty_terminal = "0.25"

# GUI (kept for omnipanel-renderer, will be replaced by wgpu in Phase 2)
egui = "0.31"

# Error handling
anyhow = "1"
thiserror = "2"
