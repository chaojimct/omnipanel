[workspace]
resolver = "2"
members = [
    "src-tauri",
    "crates/omnipanel-core",
    "crates/omnipanel-ai",
    "crates/omnipanel-renderer",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# GUI (kept for omnipanel-renderer, will be replaced by wgpu in Phase 2)
egui = "0.31"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "mysql", "postgres", "sqlite"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Protocol Lab
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"], default-features = false }
serialport = "4"
rumqttc = "0.24"
tokio-tungstenite = { version = "0.26", features = ["rustls-tls-webpki-roots"] }
futures-util = "0.3"
hex = "0.4"
url = "2"
